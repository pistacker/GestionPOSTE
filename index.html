<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion DPS</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eef5ff;
        color: #15324f;
      }

      .topbar {
        background: #124173;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .container {
        max-width: 500px;
        margin: 60px auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 10px;
      }

      button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        border: none;
        border-radius: 10px;
        background: #1d5ea8;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #124173;
      }

      .error {
        color: red;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Gestion DPS</h1>
    </div>

    <div class="container">
      <h2>Connexion</h2>
      <p>Entrez votre mot de passe</p>

      <input type="password" id="password" placeholder="Mot de passe" />
      <button onclick="login()">Se connecter</button>

      <div id="msg" class="error"></div>
    </div>

    <script>
      const API_URL = "https://dps-api.thepewst.workers.dev/";

      async function login() {
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");

        try {
          const res = await fetch(API_URL + "/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              password,
            }),
          });

          const data = await res.json();

          if (!res.ok) throw new Error(data.error || "Erreur");

          localStorage.setItem("dps-auth", "true");
          window.location.href = "admin.html";
        } catch (e) {
          msg.textContent = e.message;
        }
      }
    </script>
  </body>
</html>
