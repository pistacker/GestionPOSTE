<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion DPS</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #15324f;
        --muted: #5c728d;
        --primary: #1d5ea8;
        --primary-dark: #124173;
        --accent: #f6a623;
        --success: #2e8b57;
        --danger: #c94b4b;
        --border: #dce6f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
        color: var(--text);
      }

      .topbar {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        color: white;
        padding: 20px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.5rem;
      }

      .topbar p {
        margin: 6px 0 0;
        opacity: 0.9;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 34, 57, 0.06);
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #eef4fb;
        color: var(--primary-dark);
      }

      .btn-danger {
        background: #fff0f0;
        color: var(--danger);
      }

      .auth {
        max-width: 420px;
        margin: 40px auto;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 14px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font: inherit;
      }

      .muted {
        color: var(--muted);
      }

      .alert {
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 16px;
        display: none;
      }

      .alert.error {
        background: #fff3f3;
        color: var(--danger);
        display: block;
      }

      .alert.success {
        background: #f0fbf4;
        color: var(--success);
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .badge.ok {
        background: #eaf7ef;
        color: var(--success);
      }

      .badge.wait {
        background: #fff4e5;
        color: var(--accent);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .container {
          padding: 16px;
        }
        .card {
          padding: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Gestion DPS</h1>
      <p>Administration et consultation des activités en ligne</p>
    </div>
    <div class="container">
      <div class="card auth">
        <h2>Connexion</h2>
        <p class="muted">
          Accédez à l’espace de modification du PDF et des activités.
        </p>
        <div id="message" class="alert"></div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input
            id="password"
            type="password"
            placeholder="Entrez le mot de passe"
          />
        </div>
        <button class="btn btn-primary" onclick="login()">Se connecter</button>
      </div>
    </div>
    <script>
      async function login() {
        const password = document.getElementById("password").value;
        const message = document.getElementById("message");
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              password,
            }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Erreur");
          localStorage.setItem("dps-auth", "true");
          window.location.href = "admin.html";
        } catch (e) {
          message.className = "alert error";
          message.textContent = e.message;
        }
      }
    </script>
  </body>
</html>
