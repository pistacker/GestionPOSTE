<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration DPS</title>

    <style>
      :root {
        --bg: #f4f7fb;
        --card: #fff;
        --text: #15324f;
        --muted: #5c728d;
        --primary: #1d5ea8;
        --primary-dark: #124173;
        --accent: #f6a623;
        --success: #2e8b57;
        --danger: #c94b4b;
        --border: #dce6f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
        color: var(--text);
      }

      .topbar {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        color: white;
        padding: 20px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .topbar p {
        margin: 6px 0 0;
        opacity: 0.9;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 34, 57, 0.06);
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font: inherit;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #eef4fb;
        color: var(--primary-dark);
      }

      .btn-danger {
        background: #fff0f0;
        color: var(--danger);
      }

      .alert {
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 14px;
        display: none;
      }

      .alert.error {
        background: #fff3f3;
        color: var(--danger);
        display: block;
      }

      .alert.success {
        background: #f0fbf4;
        color: var(--success);
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.85rem;
        text-transform: uppercase;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .badge.ok {
        background: #eaf7ef;
        color: var(--success);
      }

      .badge.wait {
        background: #fff4e5;
        color: var(--accent);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Administration DPS</h1>
      <p>Cloud + D1 - Multi-utilisateur</p>
    </div>

    <div class="container">
      <div class="card">
        <h2>Nouvelle activité</h2>

        <form id="form-activity" onsubmit="saveActivity(event)">
          <div class="grid">
            <div class="field">
              <label>Association</label>
              <select id="asso">
                <option value="APC">Protection Civile</option>
                <option value="Unit">Unit' Secours</option>
              </select>
            </div>

            <div class="field">
              <label>Date</label>
              <input id="date" placeholder="JJ/MM/AAAA" required />
            </div>

            <div class="field">
              <label>Activité</label>
              <input id="activity" required />
            </div>

            <div class="field">
              <label>Lieu</label>
              <input id="place" />
            </div>

            <div class="field">
              <label>Horaire</label>
              <input id="horaire" />
            </div>

            <div class="field">
              <label>RDV</label>
              <input id="rdv" />
            </div>

            <div class="field">
              <label>Statut</label>
              <select id="statut">
                <option value="1">Inscrit</option>
                <option value="0">Souhaité</option>
              </select>
            </div>

            <div class="field">
              <label>Note</label>
              <input id="note" />
            </div>
          </div>

          <button class="btn btn-primary" type="submit">Enregistrer</button>

          <button
            class="btn btn-secondary"
            type="button"
            onclick="refreshData()"
          >
            Actualiser
          </button>
        </form>
      </div>

      <div class="card">
        <h2>Liste des activités</h2>
        <div id="list"></div>
      </div>
    </div>

    <div id="message" class="alert"></div>

    <script>
      // 🔥 TON WORKER ICI
      const API_URL = "https://dps-api.thepewst.workers.dev/";

      let cache = [];

      if (!localStorage.getItem("dps-auth")) {
        window.location.href = "index.html";
      }

      function showMessage(type, text) {
        const msg = document.getElementById("message");
        msg.className = `alert ${type}`;
        msg.textContent = text;
      }

      // 📡 GET
      async function refreshData() {
        const res = await fetch(API_URL);
        cache = await res.json();

        const list = document.getElementById("list");

        if (!cache.length) {
          list.innerHTML = "<p>Aucune activité</p>";
          return;
        }

        list.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Statut</th>
                <th>Asso</th>
                <th>Date</th>
                <th>Activité</th>
                <th>Lieu</th>
                <th>Horaire</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${cache
                .map(
                  (a) => `
                <tr>
                  <td>
                    <span class="badge ${a.inscrit ? "ok" : "wait"}">
                      ${a.inscrit ? "Inscrit" : "Souhaité"}
                    </span>
                  </td>
                  <td>${a.asso}</td>
                  <td>${a.date}</td>
                  <td>${a.activite}</td>
                  <td>${a.lieu || "-"}</td>
                  <td>${a.horaire || "-"}</td>
                  <td class="actions">
                    <button onclick="editActivity(${a.id})">Edit</button>
                    <button onclick="deleteActivity(${a.id})">Del</button>
                  </td>
                </tr>
              `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      // ➕ POST
      async function saveActivity(e) {
        e.preventDefault();

        const payload = {
          asso: asso.value,
          date: date.value,
          activite: activity.value,
          lieu: place.value,
          horaire: horaire.value,
          rdv: rdv.value,
          inscrit: statut.value === "1",
          note: note.value,
        };

        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!res.ok) return showMessage("error", "Erreur ajout");

        showMessage("success", "Ajouté");
        form.reset();
        refreshData();
      }

      // ❌ DELETE
      async function deleteActivity(id) {
        await fetch(API_URL, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });

        refreshData();
      }

      // ✏️ EDIT
      function editActivity(id) {
        const a = cache.find((x) => x.id === id);
        if (!a) return;

        asso.value = a.asso;
        date.value = a.date;
        activity.value = a.activite;
        place.value = a.lieu;
        horaire.value = a.horaire;
        rdv.value = a.rdv;
        statut.value = a.inscrit ? "1" : "0";
        note.value = a.note;
      }

      refreshData();
    </script>
  </body>
</html>
