<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Administration DPS</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #fff;
        --text: #15324f;
        --muted: #5c728d;
        --primary: #1d5ea8;
        --primary-dark: #124173;
        --accent: #f6a623;
        --success: #2e8b57;
        --danger: #c94b4b;
        --border: #dce6f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
        color: var(--text);
      }

      .topbar {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        color: white;
        padding: 20px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .topbar p {
        margin: 6px 0 0;
        opacity: 0.9;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 34, 57, 0.06);
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font: inherit;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #eef4fb;
        color: var(--primary-dark);
      }

      .btn-danger {
        background: #fff0f0;
        color: var(--danger);
      }

      .muted {
        color: var(--muted);
      }

      .alert {
        padding: 12px 14px;
        border-radius: 12px;
        margin-bottom: 14px;
        display: none;
      }

      .alert.error {
        background: #fff3f3;
        color: var(--danger);
        display: block;
      }

      .alert.success {
        background: #f0fbf4;
        color: var(--success);
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .badge.ok {
        background: #eaf7ef;
        color: var(--success);
      }

      .badge.wait {
        background: #fff4e5;
        color: var(--accent);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .hidden {
        display: none;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      @media (max-width: 720px) {
        .container {
          padding: 16px;
        }
        .card {
          padding: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Administration DPS</h1>
      <p>Ajouter, modifier ou supprimer des activités et générer le PDF</p>
    </div>
    <div class="container">
      <div class="toolbar">
        <a class="btn btn-secondary" href="consultation.html"
          >Voir la page consultation</a
        >
        <button class="btn btn-primary" onclick="logout()">Déconnexion</button>
      </div>
      <div id="message" class="alert"></div>
      <div class="card">
        <h2>Nouvelle activité</h2>
        <form id="form-activity" onsubmit="saveActivity(event)">
          <div class="grid">
            <div class="field">
              <label>Association</label>
              <select id="asso">
                <option value="APC">Protection Civile</option>
                <option value="Unit">Unit' Secours</option>
              </select>
            </div>
            <div class="field">
              <label>Date</label>
              <input id="date" type="text" placeholder="JJ/MM/AAAA" required />
            </div>
            <div class="field">
              <label>Activité</label>
              <input id="activity" required />
            </div>
            <div class="field">
              <label>Lieu</label>
              <input id="place" />
            </div>
            <div class="field">
              <label>Horaire DPS</label>
              <input id="horaire" />
            </div>
            <div class="field">
              <label>RDV local</label>
              <input id="rdv" />
            </div>
            <div class="field">
              <label>Statut</label>
              <select id="statut">
                <option value="1">Inscrit(e)</option>
                <option value="0">Souhaité</option>
              </select>
            </div>
            <div class="field">
              <label>Note</label>
              <input id="note" />
            </div>
          </div>
          <div class="actions">
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <button
              class="btn btn-secondary"
              type="button"
              onclick="refreshData()"
            >
              Actualiser
            </button>
            <button
              class="btn btn-secondary"
              type="button"
              onclick="generatePdf()"
            >
              Générer le PDF
            </button>
          </div>
        </form>
      </div>
      <div class="card">
        <h2>Liste des activités</h2>
        <div id="list"></div>
      </div>
    </div>
    <script>
      const auth = localStorage.getItem("dps-auth");
      if (!auth) window.location.href = "index.html";
      async function showMessage(type, text) {
        const msg = document.getElementById("message");
        msg.className = `alert ${type}`;
        msg.textContent = text;
      }
      async function refreshData() {
        const res = await fetch("/api/activities");
        const data = await res.json();
        const list = document.getElementById("list");
        if (!data.length) {
          list.innerHTML = '<p class="muted">Aucune activité.</p>';
          return;
        }
        list.innerHTML =
          "<table><thead><tr><th>Statut</th><th>Association</th><th>Date</th><th>Activité</th><th>Lieu</th><th>Horaire</th><th>Actions</th></tr></thead><tbody>" +
          data
            .map(
              (item, index) => `
          <tr>
            <td><span class="badge ${item.inscrit ? "ok" : "wait"}">${item.inscrit ? "Inscrit" : "Souhaité"}</span></td>
            <td>${item.asso}</td>
            <td>${item.date}</td>
            <td>${item.activite}</td>
            <td>${item.lieu || "-"}</td>
            <td>${item.horaire || "-"}</td>
            <td class="actions">
              <button class="btn btn-secondary" onclick="editActivity(${index})">Modifier</button>
              <button class="btn btn-danger" onclick="deleteActivity(${index})">Supprimer</button>
            </td>
          </tr>`,
            )
            .join("") +
          "</tbody></table>";
      }
      async function saveActivity(event) {
        event.preventDefault();
        const payload = {
          asso: document.getElementById("asso").value,
          date: document.getElementById("date").value,
          activite: document.getElementById("activity").value,
          lieu: document.getElementById("place").value,
          horaire: document.getElementById("horaire").value,
          rdv: document.getElementById("rdv").value,
          inscrit: document.getElementById("statut").value === "1",
          note: document.getElementById("note").value,
        };
        const res = await fetch("/api/activities", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erreur");
        showMessage("success", "Activité enregistrée.");
        document.getElementById("form-activity").reset();
        refreshData();
      }
      async function editActivity(index) {
        const res = await fetch("/api/activities");
        const data = await res.json();
        const item = data[index];
        if (!item) return;
        document.getElementById("asso").value = item.asso;
        document.getElementById("date").value = item.date;
        document.getElementById("activity").value = item.activite;
        document.getElementById("place").value = item.lieu || "";
        document.getElementById("horaire").value = item.horaire || "";
        document.getElementById("rdv").value = item.rdv || "";
        document.getElementById("statut").value = item.inscrit ? "1" : "0";
        document.getElementById("note").value = item.note || "";
        showMessage(
          "success",
          "Vous pouvez modifier l’activité et l’enregistrer.",
        );
      }
      async function deleteActivity(index) {
        if (!confirm("Supprimer cette activité ?")) return;
        const res = await fetch(`/api/activities/${index}`, {
          method: "DELETE",
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erreur");
        showMessage("success", "Activité supprimée.");
        refreshData();
      }
      async function generatePdf() {
        const res = await fetch("/api/pdf");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erreur");
        showMessage("success", "PDF généré.");
      }

      function logout() {
        localStorage.removeItem("dps-auth");
        window.location.href = "index.html";
      }
      refreshData();
    </script>
  </body>
</html>
