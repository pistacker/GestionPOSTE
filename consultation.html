<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultation DPS</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #fff;
        --text: #15324f;
        --muted: #5c728d;
        --primary: #1d5ea8;
        --primary-dark: #124173;
        --accent: #f6a623;
        --success: #2e8b57;
        --danger: #c94b4b;
        --border: #dce6f2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
        color: var(--text);
      }

      .topbar {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        color: white;
        padding: 20px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      .topbar p {
        margin: 6px 0 0;
        opacity: 0.9;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 34, 57, 0.06);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #eef4fb;
        color: var(--primary-dark);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      iframe {
        width: 100%;
        min-height: 78vh;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: white;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .container {
          padding: 16px;
        }
        .card {
          padding: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Consultation DPS</h1>
      <p>Consultez les activités et téléchargez le PDF</p>
    </div>
    <div class="container">
      <div class="toolbar">
        <a class="btn btn-secondary" href="admin.html">Retour administration</a>
        <a class="btn btn-primary" href="Liste_activites_secours.pdf" download
          >Télécharger le PDF</a
        >
      </div>
      <div class="card">
        <iframe src="Liste_activites_secours.pdf"></iframe>
      </div>
    </div>
  </body>
</html>
