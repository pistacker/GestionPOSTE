<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultation DPS</title>

    <style>
      :root {
        --bg: #f4f7fb;
        --card: #fff;
        --text: #15324f;
        --muted: #5c728d;
        --primary: #1d5ea8;
        --primary-dark: #124173;
        --border: #dce6f2;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 100%);
        color: var(--text);
      }

      .topbar {
        background: linear-gradient(90deg, var(--primary-dark), var(--primary));
        color: white;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: auto;
        padding: 20px;
      }

      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-secondary {
        background: #eef4fb;
        color: var(--primary-dark);
      }

      iframe {
        width: 100%;
        height: 80vh;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
      }

      .status {
        margin-bottom: 10px;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <h1>Consultation DPS</h1>
      <p>Synchronisé avec la base Cloud</p>
    </div>

    <div class="container">
      <div class="toolbar">
        <a class="btn btn-secondary" href="admin.html">Administration</a>

        <button class="btn btn-primary" onclick="loadPDF()">
          Rafraîchir PDF
        </button>

        <button class="btn btn-primary" onclick="openPDF()">Ouvrir PDF</button>
      </div>

      <div class="status" id="status">Chargement du document...</div>

      <div class="card">
        <iframe id="pdfFrame"></iframe>
      </div>
    </div>

    <script>
      const API_URL = "https://TON-WORKER.workers.dev";

      function loadPDF() {
        const frame = document.getElementById("pdfFrame");
        const status = document.getElementById("status");

        status.textContent = "Génération du PDF...";

        // 🔥 IMPORTANT : endpoint PDF du worker
        frame.src = API_URL + "/pdf?t=" + Date.now();

        setTimeout(() => {
          status.textContent = "PDF à jour ✔";
        }, 1000);
      }

      function openPDF() {
        window.open(API_URL + "/pdf", "_blank");
      }

      loadPDF();
    </script>
  </body>
</html>
